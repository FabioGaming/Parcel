name: Weekly Dev → Main Promotion PR

on:
  schedule:
    - cron: "0 9 * * 5"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch branches
        run: |
          git fetch origin main dev

      - name: Check for changes
        id: diff
        run: |
          COUNT=$(git rev-list --count origin/main..origin/dev)

          if [ "$COUNT" -eq "0" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Build commit log
        if: steps.diff.outputs.has_changes == 'true'
        id: log
        run: |
          LOG=$(git log origin/main..origin/dev \
            --pretty=format:"- %s (%h)" \
            --reverse)

          echo "log<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create PR via GitHub CLI
        if: steps.diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head dev \
            --title "Weekly promotion: dev → main" \
            --body "## Promotion PR

This PR promotes changes from \`dev\` into \`main\`.

## Commits
${{ steps.log.outputs.log }}

## Notes
- CI must pass before merge
- This is a scheduled promotion step, not a release
" \
            --label "promotion" \
            --label "automated"
