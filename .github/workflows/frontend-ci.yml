name: Frontend CI

on:
  pull_request:
    paths:
      - "apps/frontend/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - "apps/frontend/**"

  frontend-cache:
    needs: changes
    if: ${{ github.base_ref == 'main' || needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            apps/frontend/node_modules
          key: ${{ runner.os }}-npm-${{ github.run_id }}
      - name: Install dependencies
        run: npm ci
      - name: Prime cache
        run: node --version

  frontend-build:
    needs: [changes, frontend-cache]
    if: ${{ github.base_ref == 'main' || needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            apps/frontend/node_modules
          key: ${{ runner.os }}-npm-${{ github.run_id }}
      - name: Build
        run: npm run build
