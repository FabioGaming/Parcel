spring.application.name=ParcelServer

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/parcel}
spring.datasource.username=${SPRING_DATASOURCE_USERRNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}

spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true